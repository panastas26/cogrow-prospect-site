        <div class="p-6">
          <h3 class="font-headline text-xl font-bold text-primary mb-3 line-clamp-2">${project.title}</h3>
          <div class="flex items-start justify-between mb-4">
            <div class="flex-1">
              <p class="text-on-surface-variant text-sm mb-1"><span class="material-symbols-outlined text-base align-middle" style="font-variation-settings: 'FILL' 0;">location_on</span> ${project.location}</p>
              <p class="text-on-surface-variant text-sm"><span class="material-symbols-outlined text-base align-middle" style="font-variation-settings: 'FILL' 0;">calendar_today</span> ${new Date(project.date).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</p>
            </div>
          </div>
          <p class="text-on-surface text-sm leading-relaxed mb-4 line-clamp-2">${project.description}</p>
          <button class="w-full bg-tertiary-fixed text-on-tertiary-fixed py-2 rounded-lg font-bold font-headline text-sm hover:bg-primary transition-colors view-project-btn" data-id="${project.id}">
            View Before/After
          </button>
        </div>
      `;
      grid.appendChild(card);
    });

    attachViewProjectListeners();
  }

  // Filter functionality
  function attachFilterListeners() {
    document.querySelectorAll('.portfolio-filter').forEach(button => {
      button.addEventListener('click', function() {
        const filter = this.getAttribute('data-filter');
        
        // Update active state
        document.querySelectorAll('.portfolio-filter').forEach(btn => {
          btn.classList.remove('bg-primary', 'text-tertiary-fixed', 'active-filter');
          btn.classList.add('bg-surface-container-highest', 'text-on-surface');
        });
        this.classList.remove('bg-surface-container-highest', 'text-on-surface');
        this.classList.add('bg-primary', 'text-tertiary-fixed', 'active-filter');

        // Filter cards
        if (filter === 'all') {
          renderPortfolio(portfolioData);
        } else {
          const filtered = portfolioData.filter(project => serviceTypeMap[project.service_type] === filter);
          renderPortfolio(filtered);
        }
      });
    });
  }

  // View project modal
  function attachViewProjectListeners() {
    document.querySelectorAll('.view-project-btn').forEach(button => {
      button.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = this.getAttribute('data-id');
        const project = portfolioData.find(p => p.id === id);
        
        if (project) {
          document.getElementById('modalTitle').textContent = project.title;
          document.getElementById('modalBefore').src = project.before_photo_url;
          document.getElementById('modalAfter').src = project.after_photo_url;
          document.getElementById('modalService').textContent = project.service_type;
          document.getElementById('modalLocation').textContent = project.location;
          document.getElementById('modalDate').textContent = new Date(project.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
          document.getElementById('modalDescription').textContent = project.description;
          
          document.getElementById('portfolioModal').classList.remove('hidden');
        }
      });
    });
  }

  // Initialize on page load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPortfolio);
  } else {
    initPortfolio();
  }
</script>
